<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 64">
  <!-- Dark badge background -->
  <rect width="72" height="64" rx="13" fill="#0f172a"/>

  <!-- Bird body + head (single organic silhouette) -->
  <path
    fill="#34d399"
    d="M36,19 C32,12 22,10 15,14 C8,18 3,27 4,35 C5,42 8,47 12,49
       L4,57 L13,51 L7,60 L18,52
       C23,55 30,54 35,49 C40,44 43,37 43,27 C43,22 40,19 36,19 Z"
  />

  <!-- Upper beak (open mouth, pointing upper-right) -->
  <polygon fill="#34d399" points="36,19 46,14 36,24"/>

  <!-- Lower beak (open mouth, pointing lower-right) -->
  <polygon fill="#34d399" points="36,29 46,32 36,33"/>

  <!-- Eye -->
  <circle fill="#0f172a" cx="29" cy="20" r="2.6"/>

  <!-- Two beamed eighth notes floating from beak -->
  <ellipse fill="#34d399" cx="54" cy="17" rx="4" ry="3"  transform="rotate(-20 54 17)"/>
  <line   stroke="#34d399" stroke-width="2.2" stroke-linecap="round" x1="57.5" y1="15" x2="57.5" y2="5"/>

  <ellipse fill="#34d399" cx="62" cy="11" rx="4" ry="3"  transform="rotate(-20 62 11)"/>
  <line   stroke="#34d399" stroke-width="2.2" stroke-linecap="round" x1="65.5" y1="9"  x2="65.5" y2="1"/>

  <!-- Beam connecting the two stems -->
  <line   stroke="#34d399" stroke-width="3"   stroke-linecap="round" x1="57.5" y1="5"  x2="65.5" y2="1"/>
</svg>
